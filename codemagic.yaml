workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60

    environment:
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build iOS app
        script: |
          xcodebuild build \
          -workspace ios/Runner.xcworkspace \
          -scheme Runner \
          -sdk iphoneos \
          -configuration Release

    artifacts:
      - build/ios/ipa/*.ipa
